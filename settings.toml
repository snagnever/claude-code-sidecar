# =============================================================================
# settings.toml — Global settings for the filter.py Claude Code hook
# =============================================================================
#
# MODE:
#   "lists" — list-based engine only (block/allow/ask/alter from permissions.toml)
#   "risk"  — risk-level engine only (numeric risk from commands-risks.toml)
#   "both"  — both engines; the most restrictive decision wins
#
# RISK ACTION MAPPING:
#   allow       — list of risk levels that auto-allow
#   ask         — list of risk levels that prompt the user
#   block       — list of risk levels that are denied
#   block_above — any risk level above this value is also denied
#
# RISK SCALE: 0 = safe, 1 = low, 2 = medium, 3 = high, 4 = critical
#
# DELETION ENGINE:
#   enabled — true/false to enable/disable the deletion policy engine
#             (rules in delete-policy.toml)
#
# TOOL ENGINE:
#   enabled — true/false to enable/disable the tool engine for non-Bash
#             tools (Read, Write, Edit, Grep, Glob) and MCP calls
#             (rules in permissions.toml under [[tool.*]])
#
# PROFILES:
#   active_profile — optional named profile to activate by default
#   [profiles.<name>] can override mode/risk/deletion/tool_engine and choose:
#     base = "default"  # layer on top of the top-level template
#     base = "clean"    # start from an empty baseline
#
# INSTALL LOCATION: ~/.claude/claude-code-sidecar/settings.toml
# =============================================================================

version = 1
mode    = "lists"   # "lists" | "risk" | "both"
# active_profile = "strict" # optional named profile enabled by default

[risk]
allow       = [0, 1]
ask         = [2]
block       = [3, 4]
block_above = 4

[deletion]
enabled = true

[tool_engine]
enabled = true

# Example profile:
# [profiles.strict]
# base = "default"
# description = "Layered profile with stricter prompts"
#
# [profiles.strict.risk]
# allow       = [0]
# ask         = [1, 2]
# block       = [3, 4]
# block_above = 4
#
# [profiles.strict.deletion]
# enabled = true
#
# [profiles.strict.tool_engine]
# enabled = true

# =============================================================================
# settings.toml — Global settings for the filter.py Claude Code hook
# =============================================================================
#
# MODE:
#   "lists" — list-based engine only (block/allow/ask/alter from permissions.toml)
#   "risk"  — risk-level engine only (numeric risk from commands-risks.toml)
#   "both"  — both engines; the most restrictive decision wins
#
# RISK ACTION MAPPING:
#   allow       — list of risk levels that auto-allow
#   ask         — list of risk levels that prompt the user
#   block       — list of risk levels that are denied
#   block_above — any risk level above this value is also denied
#
# RISK SCALE: 0 = safe, 1 = low, 2 = medium, 3 = high, 4 = critical
#
# DELETION ENGINE:
#   enabled — true/false to enable/disable the deletion policy engine
#             (rules in delete-policy.toml)
#
# INSTALL LOCATION: ~/.claude/claude-code-sidecar/settings.toml
# =============================================================================

version = 1
mode    = "lists"   # "lists" | "risk" | "both"

[risk]
allow       = [0, 1]
ask         = [2]
block       = [3, 4]
block_above = 4

[deletion]
enabled = true

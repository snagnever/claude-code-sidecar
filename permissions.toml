# =============================================================================
# permissions.toml — Permission rules for the filter.py Claude Code hook
# =============================================================================
#
# STRUCTURE:
#   Top-level keys are tool types ("bash" for now; "mcp", "sites", etc. later).
#   Each tool type contains up to four lists, evaluated in this priority order:
#
#   1. blocklist  — DENY:  command is blocked, reason shown to Claude
#   2. alterlist  — ALTER: command is rewritten and auto-approved
#   3. asklist    — ASK:   user is prompted to confirm
#   4. allowlist  — ALLOW: command runs without prompting
#
#   If no list matches, the hook passes through to Claude Code's default
#   permission flow.
#
#   Named profiles can define their own scoped rule lists:
#     [[profiles.<name>.bash.blocklist]]
#     [[profiles.<name>.bash.allowlist]]
#     [[profiles.<name>.tool.asklist]]
#   Profile rules are prepended ahead of the top-level template when
#   settings.toml selects `base = "default"`.
#
# RULE FIELDS (common to all lists):
#   pattern  (required)  Regex for detection.
#   reason   (required)  Human-readable explanation.
#   match    (optional)  "search" (default) = match anywhere in the command.
#                        "match" = must match from the start of the command.
#
# ALTERLIST EXTRA FIELDS (at least one rewrite field required):
#   sub_pattern      Regex for substitution (used with re.sub, count=1).
#   sub_replacement  Replacement string (supports \1 backreferences).
#   prepend          String prepended to the entire command.
#   append           String appended to the entire command.
#   Precedence: sub_pattern/sub_replacement > prepend > append.
#
# REGEX QUICK REFERENCE:
#   \b        Word boundary (prevents partial matches: \bgit\b won't match "digit")
#   \s        Any whitespace (space, tab, newline)
#   \s+       One or more whitespace characters
#   \S        Any non-whitespace character
#   .         Any character (except newline, unless dotall mode)
#   .*        Zero or more of any character (greedy)
#   .*?       Zero or more of any character (non-greedy / lazy)
#   [abc]     Character class: matches a, b, or c
#   [^\s]     Negated class: any character that is NOT whitespace
#   (a|b)     Alternation: matches a or b
#   (?:...)   Non-capturing group (groups without creating a backreference)
#   (?=...)   Lookahead: matches if ... follows, without consuming it
#   (?!...)   Negative lookahead: matches if ... does NOT follow
#   (?i)      Case-insensitive flag (place at start of pattern)
#   (?s:...)  Dotall group: . matches newlines too (for multi-line commands)
#   \Z        End of string (use at end of allowlist patterns for exactness)
#   (?>...)   Atomic group (no backtracking once matched)
#
# TIPS:
#   - Use TOML literal strings (single quotes) for regex — no escaping needed!
#   - If the regex itself contains single quotes, use a double-quoted string
#     with backslash escaping (see the psql blocklist rule for an example)
#   - blocklist uses "search" by default (matches anywhere in the command)
#   - allowlist typically uses "match" (must start with the pattern)
#   - Rules are evaluated top-to-bottom within each list; first match wins
#   - A command matching blocklist is ALWAYS denied even if it also matches
#     alterlist, asklist, or allowlist
#   - On VSCODE or Cursor, for syntax highlighting, use Even Better TOML or
#     TOML Language Support extension.
#
# INSTALL LOCATION: ~/.claude/claude-code-sidecar/permissions.toml
# =============================================================================

version = 1

# ---------------------------------------------------------------------------
# BLOCKLIST — always denied, regardless of other lists
# Uses re.search (match anywhere in command) by default.
# ---------------------------------------------------------------------------

# sudo is not allowed
[[bash.blocklist]]
pattern = '\bsudo\b'
reason  = "sudo is not allowed"
match   = "search"

# Recursive force delete
[[bash.blocklist]]
pattern = 'rm\s+-[^\s]*r[^\s]*\s+-[^\s]*f|rm\s+-[^\s]*f[^\s]*\s+-[^\s]*r|rm\s+-rf|rm\s+-fr'
reason  = "Recursive force delete (rm -rf) is not allowed"
match   = "search"

# Force push to remote
[[bash.blocklist]]
pattern = 'git\s+push\s+.*--force|git\s+push\s+.*-f\b'
reason  = "Force push to remote is not allowed"
match   = "search"

# git worktree remove --force / -f bypasses dirty-tree protection
[[bash.blocklist]]
pattern = 'git\s+worktree\s+remove\b.*(?:\s--force\b|\s-f\b)'
reason  = "git worktree remove with --force or -f is not allowed"
match   = "search"

# Curl/wget pipe to shell — remote code execution
[[bash.blocklist]]
pattern = 'curl\b.*\|\s*(bash|sh|zsh|fish|python|python3|ruby|perl|node)'
reason  = "Downloading and executing remote scripts is not allowed"
match   = "search"

[[bash.blocklist]]
pattern = 'wget\b.*-O\s*-.*\|\s*(bash|sh|zsh|fish|python|python3|ruby|perl|node)'
reason  = "Downloading and executing remote scripts is not allowed"
match   = "search"

# Destructive SQL
[[bash.blocklist]]
pattern = '(?i)\bDROP\s+(TABLE|DATABASE|SCHEMA)\b'
reason  = "Destructive SQL operations are not allowed"
match   = "search"

[[bash.blocklist]]
pattern = '(?i)\bTRUNCATE\s+TABLE\b'
reason  = "TRUNCATE TABLE is not allowed"
match   = "search"

[[bash.blocklist]]
pattern = '(?i)\bDELETE\s+FROM\b(?!.*WHERE)'
reason  = "DELETE without WHERE clause is not allowed"
match   = "search"

# Write to production database without read-only flag
[[bash.blocklist]]
pattern = "psql\\b(?!.*PGOPTIONS.*read_only).*-c\\s+['\"]?\\s*(INSERT|UPDATE|DELETE|DROP|TRUNCATE|ALTER)\\b"
reason  = "Direct database write operations are not allowed"
match   = "search"

# ---------------------------------------------------------------------------
# ALTERLIST — command is rewritten for safety and auto-approved
# Uses re.search (match anywhere in command) by default.
# ---------------------------------------------------------------------------

# Auto-add --dry-run to rsync (unless --dry-run already present)
[[bash.alterlist]]
pattern         = '\brsync\b(?!.*--dry-run)'
sub_pattern     = '\brsync\b'
sub_replacement = "rsync --dry-run"
reason          = "Added --dry-run to rsync for safety"
match           = "search"

# Auto-add --dry-run to git clean (unless -n or --dry-run already present)
[[bash.alterlist]]
pattern         = '\bgit\s+clean\b(?!.*-n|.*--dry-run)'
sub_pattern     = '\bgit\s+clean\b'
sub_replacement = "git clean --dry-run"
reason          = "Added --dry-run to git clean for safety"
match           = "search"

# ---------------------------------------------------------------------------
# ASKLIST — user is prompted to confirm before execution
# Uses re.search (match anywhere in command) by default.
# ---------------------------------------------------------------------------

# rm — handled by deletion engine (delete-policy.toml)
# Generic rm asklist removed; the deletion engine provides granular
# path-based and git-aware policy for rm commands.

# find with side effects — allow read-only exec, ask for everything else
[[bash.asklist]]
pattern = '\bfind\b.*(-delete|-ok\b|-okdir\b|-exec(dir)?\s+(?!grep\b|egrep\b|fgrep\b|rg\b|cat\b|head\b|tail\b|file\b|stat\b|wc\b|ls\b|basename\b|dirname\b))'
reason  = "find with side effects — confirm execution, allow read-only exec"
match   = "search"

# Git stash — only when the shell command *starts* with git stash (not cd … && git stash …).
# Embedded stash in compound commands is covered by the cd allowlist instead.
[[bash.asklist]]
pattern = '(?s:git\s+stash\b(?!\s+(pop|apply|branch)\b).*)'
reason  = "Git stash (other subcommands) — confirm"
match   = "match"

# Git rebase / merge — search: still ask when embedded in chains
[[bash.asklist]]
pattern = '\bgit\s+(rebase|merge)\b'
reason  = "Git repository modification — confirm"
match   = "search"

# File permission changes
[[bash.asklist]]
pattern = '\b(chown)\b'
reason  = "Permission change — confirm"
match   = "search"

# Package installations
[[bash.asklist]]
pattern = '\b(pip|pip3)\s+install\b'
reason  = "Python package installation — confirm"
match   = "search"

[[bash.asklist]]
pattern = '\bnpm\s+install\b'
reason  = "npm package installation — confirm"
match   = "search"

[[bash.asklist]]
pattern = '\bbrew\s+install\b'
reason  = "Homebrew package installation — confirm"
match   = "search"

# Docker resource removal
[[bash.asklist]]
pattern = '\bdocker\s+(rm|rmi|system\s+prune|volume\s+rm)\b'
reason  = "Docker resource removal — confirm"
match   = "search"

# Python heredoc/inline with dangerous operations (overrides allowlist)
[[bash.asklist]]
pattern = '(?s)python3?\b.*(-c\s|<<).*?(os\.(system|popen|exec\w*|remove|unlink|rmdir)|subprocess\.|shutil\.(rmtree|move)|\bexec\s*\(|\beval\s*\(|__import__)'
reason  = "Python heredoc/inline script with potentially dangerous operations — confirm"
match   = "search"

# Node inline scripts with dangerous operations (overrides allowlist)
[[bash.asklist]]
pattern = "(?s)node\\b.*-e\\s.*?(child_process\\.|require\\([\"']child_process[\"']\\)|fs\\.(rm|rmdir|unlink|rmSync|rmdirSync|unlinkSync)|require\\([\"']fs[\"']\\))"
reason  = "Node inline script with potentially dangerous operations — confirm"
match   = "search"

# ---------------------------------------------------------------------------
# ALLOWLIST — auto-approved without prompting
# Uses re.match (from start of command) by default, so commands must
# START with the pattern. Use (?s:...) for dotall mode on multi-line cmds.
# ---------------------------------------------------------------------------

##########################################################################
# Shell navigation and inspection

[[bash.allowlist]]
pattern = '(?s:(cd|pwd|which|echo|mkdir|find|du|file).*)\Z'
reason  = "Shell navigation and inspection"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:ls.*)\Z'
reason  = "List directory contents"
match   = "match"

# Read-only git operations (optional -C <path> for running in another repo)
[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?(diff|log|status|fetch|show|ls-tree|remote get-url).*)\Z'
reason  = "Read-only git operations"
match   = "match"

##########################################################################
# Git stash — pop / apply / branch (explicit allow; other stash subcommands ask)

[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?stash\ (pop|apply|branch)\b.*)\Z'
reason  = "Git stash pop, apply, or branch"
match   = "match"

# Write git operations (single command)
[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?(checkout|branch|add|commit|stash|pull|push).*)\Z'
reason  = "Write git operations (single command)"
match   = "match"

# Linked worktree checkout (creates a new directory + worktree entry)
[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?worktree\ add.*)\Z'
reason  = "Git worktree add"
match   = "match"

# Remove linked worktree (safe form: refuses if dirty; --force/-f is blocklisted above)
[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?worktree\ remove\b(?!.*(?:\s--force\b|\s-f\b)).*)\Z'
reason  = "Git worktree remove (without --force or -f)"
match   = "match"

# Chained git write operations with &&
[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?(checkout|branch|add|commit|stash|pull|push)(?>.*&&\s*git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?(checkout|branch|add|commit|stash|pull|push))*.*)\Z'
reason  = "Chained git write operations"
match   = "match"

# Remove only git-tracked files (safe — content recoverable from git history)
[[bash.allowlist]]
pattern = '(?s:git\s+(?:-C\s+(?:"[^"]*"|\S+)\s+)?rm.*)\Z'
reason  = "Remove git-tracked files only"
match   = "match"

# GitHub CLI — read-only (introspection, list, view, diff, search, etc.)
# Excludes writes: pr create/merge/checkout, issue create/edit, release create, gh api (except graphql read-only below), auth login, …
# (pr create, issue edit, project item-add / item-edit, and gh api graphql -f query= are allowlisted separately below)
[[bash.allowlist]]
pattern = '(?s:(?:gh\s*\Z|gh\s+(?:(?:--version|-h\b|--help)\b|version\b|help\b|auth\s+status\b|status\b|browse\b|repo\s+(?:list|view)\b|issue\s+(?:list|view|status)\b|pr\s+(?:list|view|status|diff|checks)\b|workflow\s+(?:list|view)\b|run\s+(?:list|view|watch)\b|release\s+(?:list|view)\b|gist\s+(?:list|view)\b|label\s+list\b|org\s+list\b|search\b|project\s+(?:list|view|field-list|item-list)\b|ruleset\s+(?:list|view)\b|secret\s+list\b|variable\s+list\b|ssh-key\s+list\b|gpg-key\s+list\b|alias\s+list\b|extension\s+(?:list|browse|search)\b|config\s+(?:list|get)\b|cache\s+list\b|codespace\s+(?:list|view)\b|completion\s+\S+|attestation\s+(?:verify|trusted-root)\b).*)\Z)'
reason  = "GitHub CLI read-only"
match   = "match"

# GitHub PR create (write)
[[bash.allowlist]]
pattern = '(?s:gh\s+pr\s+create\b.*)\Z'
reason  = "GitHub PR create"
match   = "match"

# GitHub issue edit (write)
[[bash.allowlist]]
pattern = '(?s:gh\s+issue\s+edit\b.*)\Z'
reason  = "GitHub issue edit"
match   = "match"

# GitHub project item-add (write)
[[bash.allowlist]]
pattern = '(?s:gh\s+project\s+item-add\b.*)\Z'
reason  = "GitHub project item-add"
match   = "match"

# GitHub project item-edit (write)
[[bash.allowlist]]
pattern = '(?s:gh\s+project\s+item-edit\b.*)\Z'
reason  = "GitHub project item-edit"
match   = "match"

# GitHub GraphQL — read-only: inline query via -f query= / --field query= (no mutation keyword; no query=@ file)
[[bash.allowlist]]
pattern = '(?s:gh\s+api\s+graphql\b(?=.*(?:-f|--field)\s+query=)(?!.*(?:-f|--field)\s+query=@)(?!.*(?i:\bmutation\b)).*)\Z'
reason  = "GitHub CLI: graphql with inline field query= only (read-only queries)"
match   = "match"

# Google Cloud — read-only log queries (not logging write or other gcloud writes)
[[bash.allowlist]]
pattern = '(?s:gcloud\s+logging\s+read\b.*)\Z'
reason  = "gcloud logging read (read-only)"
match   = "match"

# Read-only PostgreSQL (with PGOPTIONS read-only flag)
# localhost:any port, geo_brand_monitor + optional suffix (_test, _023b, …), optional ?query on URL
[[bash.allowlist]]
pattern = '(?s:\s*PGOPTIONS="\-c\ default_transaction_read_only=on"\ psql\ "postgresql://postgres:postgres@localhost:\d{2,5}/geo_brand_monitor[a-zA-Z0-9_]*(?:\?[^"]*)?"\ .*)\Z'
reason  = "Read-only PostgreSQL"
match   = "match"

##########################################################################
# Backend tooling — poetry commands

[[bash.allowlist]]
pattern = '(?s:poetry\ run\ poe.*)\Z'
reason  = "Backend tooling"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:poetry\ run\ ruff.*)\Z'
reason  = "Backend tooling"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:poetry\ run\ mypy.*)\Z'
reason  = "Backend tooling"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:poetry\ run\ pytest.*)\Z'
reason  = "Backend tooling"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:poetry\ run\ alembic\ (head|heads|current|history).*)\Z'
reason  = "Backend tooling"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:poetry\ env\ info.*)\Z'
reason  = "Poetry env info (read-only)"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:poetry\ show.*)\Z'
reason  = "Poetry show (read-only dependency info)"
match   = "match"

# Inline Python via Poetry (same intent as python -c allowlist; dangerous ops still hit asklist first)
[[bash.allowlist]]
pattern = '(?s:poetry\ run\ python3?\s+-c\s.*)\Z'
reason  = "Poetry: inline Python (-c) in project venv"
match   = "match"

##########################################################################
# Backend tooling — pytest commands

[[bash.allowlist]]
pattern = '(?s:python3?\s+-m\s+pytest.*)\Z'
reason  = "Backend tooling"
match   = "match"

# JSON pretty-print (read-only formatter)
[[bash.allowlist]]
pattern = '(?s:python3?\s+-m\s+json\.tool.*)\Z'
reason  = "JSON formatting via json.tool"
match   = "match"

##########################################################################
# Media — ffmpeg / ffprobe

[[bash.allowlist]]
pattern = '(?s:ffmpeg\b.*)\Z'
reason  = "ffmpeg (transcode / media processing)"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:ffprobe\b.*)\Z'
reason  = "ffprobe (media introspection)"
match   = "match"

##########################################################################
# Frontend — npm test and lint commands

[[bash.allowlist]]
pattern = '(?s:npm\ (test|run\ (lint|lint:strict|validate|format|typecheck)).*)\Z'
reason  = "Frontend test and lint"
match   = "match"

# pnpm — workspace test via --filter / -F only (not run/exec/install).
# Blocks && || ; and arbitrary pipes; allows optional 2>&1 | head|tail|grep|… (same read-only set as curl).
# Filter selector: double-quoted "…" or unquoted token (\S+). Shell single-quoted selectors are not matched.
[[bash.allowlist]]
pattern = '(?s:(?!.*(?:\s&&\s|\s\|\|\s|;))(?:(?:pnpm\s+(?:--filter\s+|-F\s+)(?:"[^"]*"|\S+)\s+test\b[^|]*)\Z|(?:pnpm\s+(?:--filter\s+|-F\s+)(?:"[^"]*"|\S+)\s+test\b[^|]*(?:\s*(?:2>&1\s*)?\|\s*(?:head|tail|wc|cat|grep|egrep|fgrep|rg|sed|awk|sort|uniq|tr|cut|jq|less|more|strings|python3?\s+-m\s+json\.tool)(?:\s[^|]*)?)+)\Z))'
reason  = "pnpm: filtered workspace test (lifecycle test only; safe pipes)"
match   = "match"

# npm: introspection + ci, audit fix, cache clean, uninstall (not install/run/publish)
[[bash.allowlist]]
pattern = '(?s:npm(?:\s+(?:--version|-v)\b|\s+(?:ls|list|ll|la|outdated|view|info|search|whoami|ping|doctor|explain|fund|stars|root|bin|prefix|help|pkg\s+get|query|config\s+(?:get|list|ls)|get\b|cache\s+(?:ls|verify|list|clean)|audit|ci|uninstall|find-dupes)\b.*)\Z)'
reason  = "npm: list/view/config, ci, audit (incl. fix), cache clean, uninstall, find-dupes, etc."
match   = "match"

# npm pack only when --dry-run (no .tgz written)
[[bash.allowlist]]
pattern = '(?s:npm\s+pack\b.*--dry-run\b.*)\Z'
reason  = "npm pack --dry-run (no tarball written)"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:npx\ (next\ lint|eslint|prettier|jest).*)\Z'
reason  = "Frontend lint/format via npx"
match   = "match"

# TypeScript: typecheck only (--noEmit), e.g. npx tsc --noEmit -p tsconfig.json 2>&1 | head -20
[[bash.allowlist]]
pattern = '(?s:npx\s+tsc\s+--noEmit\b.*)\Z'
reason  = "TypeScript typecheck (npx tsc --noEmit)"
match   = "match"

# curl — loopback: any path; pipe only to read-only tools (head, jq, grep, …). No ; && ||
[[bash.allowlist]]
pattern = '(?s:(?:(?!.*\|)curl\s+(?!.*(?:\s&&\s|\s\|\|\s|;)).*https?://(?:localhost|127\.0\.0\.1|\[::1\])(?::\d+)?(?:/[^\s]*)?.*|(?:curl\s+(?!.*(?:\s&&\s|\s\|\|\s|;)).*https?://(?:localhost|127\.0\.0\.1|\[::1\])(?::\d+)?(?:/[^\s]*)?)(?:\s*(?:2>&1\s*)?\|\s*(?:head|tail|wc|cat|grep|egrep|fgrep|rg|sed|awk|sort|uniq|tr|cut|jq|less|more|strings|python3?\s+-m\s+json\.tool)(?:\s[^|]*)?)+)\Z)'
reason  = "curl to localhost / 127.0.0.1 / ::1; optional pipe to read-only commands only"
match   = "match"

# curl — external: probe-style path only (/…/health|healthz|ready|live…), no -d/-o/--data, no ../, GET only; same read-only pipe rule
[[bash.allowlist]]
pattern = '(?s:(?!.*(?:\s-d\b|\s--data(?:-binary)?\b|\s--upload-file\b|\s-T\s|\s-F\s|\s--form\b|\s-o\s|\s--output\b|\s-O\b))(?!.*\s-X\s+(?!GET\b)\S+)(?!.*\.\./)(?:(?!.*\|)curl\s+.*https?://(?!localhost\b|127\.0\.0\.1|\[::1\])([^\s/:]+)(?::\d+)?(?i:(?:/[\w.-]+)*/(?:health|healthz|readyz?|live))(?=[\s?/#]|$).*|(?:curl\s+.*https?://(?!localhost\b|127\.0\.0\.1|\[::1\])([^\s/:]+)(?::\d+)?(?i:(?:/[\w.-]+)*/(?:health|healthz|readyz?|live))(?=[\s?/#]|$))(?:\s*(?:2>&1\s*)?\|\s*(?:head|tail|wc|cat|grep|egrep|fgrep|rg|sed|awk|sort|uniq|tr|cut|jq|less|more|strings|python3?\s+-m\s+json\.tool)(?:\s[^|]*)?)+)\Z)'
reason  = "curl to external host: health-style path only; no body/upload/output flags; read-only pipe only"
match   = "match"

# Text and process utilities (read-only or safe); jq JSON queries
[[bash.allowlist]]
pattern = '(?s:(sort|uniq|wc|head|tail|grep|sed|awk|tr|touch|pgrep|\bps\b|jq).*)\Z'
reason  = "Text and process inspection utilities; jq"
match   = "match"

# OpenAI Codex CLI
[[bash.allowlist]]
pattern = '(?s:codex\b.*)\Z'
reason  = "Codex CLI"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:cat(?>.*?\|)(?>.*?grep).*)\Z'
reason  = "cat with grep (read-only pipeline)"
match   = "match"

# Playwright / MCP tool results under Claude projects (cat JSON → python3 -c)
[[bash.allowlist]]
pattern = '(?s:cat\s+/Users/vitor/\.claude/projects/[^/]+/[^/]+/tool-results/[^\s]+\.json(?:\s*\|\s*python3?\s+-c\s.*)?)\Z'
reason  = "Playwright/tool results: read tool-results JSON from Claude projects (optionally pipe to python3 -c)"
match   = "match"

# cat path/to/file.json | python3 -c "…" (e.g. json.load(sys.stdin) — read-only pipeline)
[[bash.allowlist]]
pattern = '(?s:cat\s+[^\s|]+\.json\s*\|\s*python3?\s+-c\s.*)\Z'
reason  = "cat a .json file into python3 -c (stdin JSON check / inspection)"
match   = "match"

##########################################################################
# Docker — read-only inspection (no run/pull/build/exec/rm)

[[bash.allowlist]]
pattern = '(?s:docker\s+(?:--version|--help|version\b|-v\b|help(?:\s+[^\s]+)?|ps\b|images\b|inspect\b|logs\b|port\b|stats\b|top\b|diff\b|events\b|history\b|info\b|search\b|container\s+(?:ls|inspect|ps|stats|top|port|diff)\b|image\s+(?:ls|inspect|history)\b|network\s+(?:ls|inspect)\b|volume\s+(?:ls|inspect)\b|system\s+(?:df|info|events)\b|context\s+(?:ls|inspect)\b|plugin\s+(?:ls|inspect)\b|compose\s+(?:ps|config|ls|top|images|version|convert|profiles|events)\b|manifest\s+inspect\b|buildx\s+(?:ls|inspect|version|du)\b).*)\Z'
reason  = "Docker read-only: list, inspect, logs, stats, compose ps/config, etc."
match   = "match"

# Project spec scripts
[[bash.allowlist]]
pattern = '(?s:\.specify/scripts/bash/.*)\Z'
reason  = "Project spec scripts under .specify/scripts/bash"
match   = "match"

# Superpowers brainstorming scripts (any version, any marketplace)
[[bash.allowlist]]
pattern = '(?s:bash\s+/Users/vitor/\.claude/plugins/cache/[^/]+/superpowers/[^/]+/skills/brainstorming/scripts/.*)\Z'
reason  = "Superpowers brainstorming scripts"
match   = "match"

# Superpowers brainstorming scripts (direct invocation, any version)
[[bash.allowlist]]
pattern = '(?s:/Users/vitor/\.claude/plugins/cache/[^/]+/superpowers/[^/]+/skills/brainstorming/scripts/.*)\Z'
reason  = "Superpowers brainstorming scripts"
match   = "match"

[[bash.allowlist]]
pattern = '(?s:\./scripts/agent-worktrees/create-agent-worktree\.sh.*)\Z'
reason  = "Agent worktree helper script"
match   = "match"

# Project agent scripts (any invocation under scripts/agents/)
[[bash.allowlist]]
pattern = '(?s:(?:(?:bash|sh|node|python3?)\s+)?(?:\./)?scripts/agents/.*)\Z'
reason  = "Project scripts under scripts/agents/"
match   = "match"

##########################################################################
# Agents commands with heredoc/inline scripts

# Python inline and heredoc scripts (dangerous operations caught by asklist above)
[[bash.allowlist]]
pattern = '(?s:python3?\s+-c\s.*)\Z'
reason  = "Python inline script"
match   = "match"

# Python inline and heredoc scripts (dangerous operations caught by asklist above)
[[bash.allowlist]]
pattern = '(?s:python3?\s.*<<.*)\Z'
reason  = "Python heredoc script"
match   = "match"

# Node inline scripts (dangerous operations caught by asklist above)
[[bash.allowlist]]
pattern = '(?s:node\s+-e\s+.*)\Z'
reason  = "Node inline script"
match   = "match"


# =============================================================================
# TOOL ENGINE — Rules for non-Bash tools (Read, Write, Edit, etc.) and MCP calls
# =============================================================================
#
# STRUCTURE:
#   Rules use [[tool.blocklist]], [[tool.asklist]], [[tool.allowlist]], and
#   [[tool.alterlist]] sections. Evaluation order is the same as bash rules:
#
#   1. blocklist  — DENY:  tool call is blocked, reason shown to Claude
#   2. alterlist  — ALTER: tool_input is rewritten and auto-approved
#   3. asklist    — ASK:   user is prompted to confirm
#   4. allowlist  — ALLOW: tool call runs without prompting
#
#   If no list matches, the hook passes through to Claude Code's default
#   permission flow.
#
# RULE FIELDS:
#   tools   (required)  List of tool name patterns (regex). Each entry is
#                        tested with re.search against the tool_name.
#                        MCP tools use names like "mcp__server__action".
#   reason  (required)  Human-readable explanation.
#   fields  (optional)  Sub-table of field predicates. Each key is a
#                        tool_input field name, each value is a regex pattern.
#                        ALL field predicates must match (AND logic).
#
# ALTERLIST EXTRA FIELD:
#   transform (required for alterlist) Sub-table of field mutations.
#     Each key is a tool_input field name. Value is a dict with one of:
#       - sub_pattern + sub_replacement: regex substitution (count=1)
#       - prepend: string prepended to the field value
#       - append: string appended to the field value
#
# COMMON TOOL_INPUT FIELDS BY TOOL TYPE:
#   Read:   file_path, offset, limit
#   Write:  file_path, content
#   Edit:   file_path, old_string, new_string
#   Grep:   pattern, path, glob, type
#   Glob:   pattern, path
#   MCP:    varies by server/tool (check MCP server docs)
#
# TIPS:
#   - Tool names are case-sensitive: "Write" not "write"
#   - MCP tool names follow the pattern: mcp__<server>__<action>
#   - Use ".*" in tools list to match all tools
#   - Omit the [fields] sub-table to match on tool name alone
#   - To toggle the tool engine on/off, use settings.toml [tool_engine]
#
# =============================================================================

# ---------------------------------------------------------------------------
# TOOL BLOCKLIST — always denied
# ---------------------------------------------------------------------------

# Block writes to secrets and credential files
[[tool.blocklist]]
tools  = ["Write", "Edit"]
reason = "Cannot modify secrets or credential files"
[tool.blocklist.fields]
file_path = '\.(env|pem|key|secret|credentials)$|credentials\.json'

# Block writes to system directories
[[tool.blocklist]]
tools  = ["Write", "Edit"]
reason = "System paths are off-limits"
[tool.blocklist.fields]
file_path = '^/(etc|usr|var|opt)/'

# ---------------------------------------------------------------------------
# TOOL ASKLIST — user is prompted to confirm
# ---------------------------------------------------------------------------

# Ask before writing to CI/CD config
[[tool.asklist]]
tools  = ["Write", "Edit"]
reason = "CI/CD configuration change — confirm"
[tool.asklist.fields]
file_path = '\.github/workflows/|\.gitlab-ci|Jenkinsfile|\.circleci/'

# Ask before writing to lock files
[[tool.asklist]]
tools  = ["Write", "Edit"]
reason = "Lock file modification — confirm"
[tool.asklist.fields]
file_path = 'package-lock\.json$|poetry\.lock$|Cargo\.lock$|yarn\.lock$'

# ---------------------------------------------------------------------------
# TOOL ALLOWLIST — auto-approved without prompting
# ---------------------------------------------------------------------------

# Read-only tools are always safe
[[tool.allowlist]]
tools  = ["Read", "Grep", "Glob"]
reason = "Read-only tools are always safe"

# ---------------------------------------------------------------------------
# MCP RULES — use the same [[tool.*]] sections with mcp__* tool names
# ---------------------------------------------------------------------------
# Examples (uncomment and customize):
#
# # Block an entire MCP server
# [[tool.blocklist]]
# tools  = ["mcp__plugin_dangerous-server_.*"]
# reason = "This MCP server is not authorized"
#
# # Ask before episodic memory writes
# [[tool.asklist]]
# tools  = ["mcp__plugin_episodic-memory_episodic-memory__write"]
# reason = "Confirm memory mutation"
#
# # Allow documentation lookups
# [[tool.allowlist]]
# tools  = ["mcp__plugin_context7_context7__.*"]
# reason = "Documentation lookups are safe"

# Context7 MCP (any server slug containing "context7"): auto-approve docs queries
[[tool.allowlist]]
tools  = ['(?i)mcp__.*context7.*__.*']
reason = "Context7 MCP: library documentation lookups (trusted)"

# MCP browser automation (Playwright MCP, Cursor IDE browser, etc.):
# - Microsoft @playwright/mcp uses tools named browser_navigate, browser_fill_form,
#   browser_click, … The UI shows "playwright - Fill form" but tool_name is often
#   mcp__<server_slug>__browser_* and server_slug may NOT contain the word "playwright"
#   (e.g. io.github.microsoft/playwright-mcp sanitized), so do not rely on that substring.
# - Cursor IDE browser uses mcp__cursor-ide-browser__browser_* (same browser_* suffix).
[[tool.allowlist]]
tools  = [
  '(?i)mcp__.*playwright.*__.*',
  '(?i)mcp__.*__browser_.*',
]
reason = "MCP browser automation: any server with browser_* tools (Playwright MCP, Cursor browser); optional playwright substring match"

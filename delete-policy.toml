# =============================================================================
# delete-policy.toml — Deletion policy for the filter.py Claude Code hook
# =============================================================================
#
# Controls which files can be deleted via `rm` commands. Rules are evaluated
# top-to-bottom; the first matching rule wins for each file path.
#
# RULE FIELDS:
#   paths  (required) — list of glob patterns matched against the file path
#   action (required) — "allow" | "ask" | "block"
#   reason (required) — human-readable explanation (shown on ask/block)
#   git    (optional) — git condition: "tracked" | "clean" | "committed" | "any"
#                       If set and the condition fails, the rule is skipped.
#
# GIT CONDITIONS:
#   "tracked"   — file is in the git index (git ls-files --error-unmatch)
#   "clean"     — file has no uncommitted changes (git status --porcelain is empty)
#   "committed" — file has at least one commit (git log --oneline -1 succeeds)
#   "any"       — no git check (same as omitting the field)
#
# PROJECT-SCOPED RULES:
#   [[projects]] entries apply only when $CLAUDE_PROJECT_DIR matches the
#   project path. Project rules are checked before global rules.
#
# DEFAULT ACTION:
#   When no rule matches a file, default_action applies.
#
# MULTI-FILE COMMANDS:
#   For `rm file1 file2 file3`, each file is evaluated independently.
#   The most restrictive result wins (block > ask > allow).
#
# INSTALL LOCATION: ~/.claude/claude-code-sidecar/delete-policy.toml
# =============================================================================

version = 1
default_action = "ask"   # "ask" | "block" | "allow"

# ---------------------------------------------------------------------------
# Build artifacts — always safe to delete (regenerated by build tools)
# ---------------------------------------------------------------------------
[[rules]]
paths  = ["build/**", "dist/**", "__pycache__/**", "*.pyc", ".pytest_cache/**", ".next/**"]
action = "allow"
reason = "Build artifacts are always safe to delete"

# ---------------------------------------------------------------------------
# Dependencies — can be reinstalled
# ---------------------------------------------------------------------------
[[rules]]
paths  = ["node_modules/**"]
action = "allow"
reason = "Dependencies can be reinstalled"

# ---------------------------------------------------------------------------
# Secrets — never delete via automation
# ---------------------------------------------------------------------------
[[rules]]
paths  = ["*.env", "*.pem", "*.key", "*.secret"]
action = "block"
reason = "Never delete secrets via automation"

# ---------------------------------------------------------------------------
# Git-tracked files — recoverable from history
# ---------------------------------------------------------------------------
[[rules]]
paths  = ["**/*"]
git    = "tracked"
action = "allow"
reason = "Git-tracked files are recoverable from history"

# ---------------------------------------------------------------------------
# Temporary files — safe to delete
# ---------------------------------------------------------------------------
[[rules]]
paths  = ["**/*.tmp", "**/*.tmp.*", "/tmp/**"]
action = "allow"
reason = "Temporary files are safe to delete"

# ---------------------------------------------------------------------------
# Log files — safe to delete
# ---------------------------------------------------------------------------
[[rules]]
paths  = ["**/*.log", "**/*.log.*"]
action = "allow"
reason = "Log files are safe to delete"

# ---------------------------------------------------------------------------
# Project-scoped rules (example — uncomment and adapt)
# ---------------------------------------------------------------------------
# [[projects]]
# project = "/path/to/project"
#
#   [[projects.rules]]
#   paths  = ["tmp/**", "logs/**"]
#   action = "allow"
#   reason = "Temp files for this project"
